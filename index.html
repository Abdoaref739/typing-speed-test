<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>typing speed test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="upper-page-div">
        <div class="welcome-main-div">
        <h1 class="main-text">Typing Speed <span class="styled-text">Test</span></h1>
        <Span id="welcome-text"></Span>
        </div>
        <i class="fa-solid fa-gear" id="gear-icon"></i>
        <div id="profile-choices-div">
            <i class="fa-solid fa-circle-user" id="profile-icon"></i>
            <div id="profile-choices">
            <span>Go to profile!</span>
            </div>
        </div>
    </div>
    <div id="middle-page-div">
            <div class="words-type">
            <div id="time-based-test-button">
                <i class="fa-solid fa-clock"></i>
                Time: 
            <span id="timer-span">--</span>
            </div>
        </div>
        <div id="words-box"><h1 id="words-text"></h1></div>
        <div id="restart-button">
            <i class="fa-solid fa-power-off"></i>
            restart <span class="styled-restart">(shift + alt)</span>
        </div>
        <div id="results-div">
        <div class="words-per-second-div">
            WpS: <span id="words-per-second-span">--</span>
        </div>
        <div class="words-per-minute-div">
            WpM: <span id="words-per-minute-span">--</span>
        </div>
    </div>
    </div>
    <div id="options-div">
        <div class="options-upper-page-div">
            <h1 class="option-main-text">options</h1>
        <i class="fa-solid fa-x" id="close-icon"></i>
        </div>
        <div class="rest-of-options">
            <div class="option-one-div">
        <span class="themes-label">Themes: </span>
        <div id="options-selection">
            <button id="theme-option1" class="theme-option"> <i class="fa-solid fa-check" id="theme-option1-check"></i>Blue emerald</button>
            <button id="theme-option2" class="theme-option"> <i class="fa-solid fa-check" id="theme-option2-check"></i>Night hacker</button>
            <button id="theme-option3" class="theme-option"> <i class="fa-solid fa-check" id="theme-option3-check"></i>Paper ink</button>
            <button id="theme-option4" class="theme-option"> <i class="fa-solid fa-check" id="theme-option4-check"></i>Midnight blue</button>
        </div>
        </div>
        </div>
    </div>
    <div id="lower-page-div">
        <button id="github-button" ><i class="fa-brands fa-github"></i></button>
        <button id="buy-me-a-coffee-button"><img src="./images/buymeacoffee.jpg" class="coffee-image"></button>
        <h1 class="footer-text">2026 &copy; copyright all rights reserved!</h1>
    </div>
    <script src="script.js"></script>
    </body>
</html>
